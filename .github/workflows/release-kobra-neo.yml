name: Release Kobra Neo firmware

# Build firmware.bin for the Kobra Neo on every v* tag push and attach it
# to the corresponding GitHub Release. The tag's commit is what gets built.
#
# Usage:
#   git tag v0.2
#   git push origin v0.2
#
# A release is created (or updated, if pre-created) at tag v0.2 with the
# binary attached as firmware-kobra-neo-v0.2.bin so users can SD-flash it
# directly without setting up PlatformIO themselves.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build firmware
        run: pio run -e HC32F460E_anycubic_kobra_neo

      - name: Rename binary
        id: rename
        run: |
          set -eu
          REF_NAME="${GITHUB_REF_NAME}"
          OUT="firmware-kobra-neo-${REF_NAME}.bin"
          cp .pio/build/HC32F460E_anycubic_kobra_neo/firmware.bin "$OUT"
          ls -la "$OUT"
          echo "asset=$OUT" >> "$GITHUB_OUTPUT"

      - name: Create / update release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.rename.outputs.asset }}
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Upload as workflow artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: firmware-kobra-neo
          path: ${{ steps.rename.outputs.asset }}
          if-no-files-found: error
